name: Vyapar AI Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-debug:
    name: Build Debug APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Check Project Files
        run: |
          test -f android-app/settings.gradle
          test -f android-app/build.gradle
          test -f android-app/app/build.gradle
          test -f android-app/app/src/main/AndroidManifest.xml
          test -f android-app/app/src/main/java/com/vyaparai/app/MainActivity.java
          test -f android-app/app/src/main/assets/index.html
          echo "Vyapar AI project OK"

      - name: Build Debug APK
        working-directory: android-app
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Build Debug AAB
        working-directory: android-app
        run: gradle --no-daemon --stacktrace :app:bundleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VyaparAI-Debug-APK
          path: android-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Debug AAB
        uses: actions/upload-artifact@v4
        with:
          name: VyaparAI-Debug-AAB
          path: android-app/app/build/outputs/bundle/debug/*.aab
          if-no-files-found: error

  build-playstore-release:
    name: Build Signed Play Store AAB
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Decode Keystore
        env:
          VYAPAR_KEYSTORE_BASE64: ${{ secrets.VYAPAR_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$VYAPAR_KEYSTORE_BASE64" ]; then
            echo "Signing secret missing: VYAPAR_KEYSTORE_BASE64"
            exit 1
          fi

          echo "$VYAPAR_KEYSTORE_BASE64" | base64 --decode > android-app/upload-keystore.jks

      - name: Build Signed Release AAB
        working-directory: android-app
        env:
          VYAPAR_KEYSTORE_FILE: ${{ github.workspace }}/android-app/upload-keystore.jks
          VYAPAR_KEYSTORE_PASSWORD: ${{ secrets.VYAPAR_KEYSTORE_PASSWORD }}
          VYAPAR_KEY_ALIAS: ${{ secrets.VYAPAR_KEY_ALIAS }}
          VYAPAR_KEY_PASSWORD: ${{ secrets.VYAPAR_KEY_PASSWORD }}
        run: gradle --no-daemon --stacktrace :app:bundleRelease

      - name: Upload Signed Play Store AAB
        uses: actions/upload-artifact@v4
        with:
          name: VyaparAI-PlayStore-Release-AAB
          path: android-app/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
