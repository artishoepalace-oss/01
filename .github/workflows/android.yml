name: Vyapar AI Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-debug:
    name: Build Debug APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Packages
        run: |
          sdkmanager --version
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          yes | sdkmanager --licenses || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Find Android Project
        run: |
          if [ -d "android-app" ]; then
            echo "PROJECT_DIR=android-app" >> $GITHUB_ENV
          elif [ -d "VyaparAI_GitHub_Compatible/android-app" ]; then
            echo "PROJECT_DIR=VyaparAI_GitHub_Compatible/android-app" >> $GITHUB_ENV
          else
            echo "android-app folder not found"
            ls -la
            exit 1
          fi

      - name: Check Project Files
        run: |
          test -f "$PROJECT_DIR/settings.gradle"
          test -f "$PROJECT_DIR/build.gradle"
          test -f "$PROJECT_DIR/app/build.gradle"
          test -f "$PROJECT_DIR/app/src/main/AndroidManifest.xml"
          test -f "$PROJECT_DIR/app/src/main/java/com/vyaparai/app/MainActivity.java"
          test -f "$PROJECT_DIR/app/src/main/assets/index.html"
          echo "Vyapar AI project OK"

      - name: Build Debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Build Debug AAB
        run: |
          cd "$PROJECT_DIR"
          gradle --no-daemon --stacktrace :app:bundleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VyaparAI-Debug-APK
          path: |
            android-app/app/build/outputs/apk/debug/*.apk
            VyaparAI_GitHub_Compatible/android-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Debug AAB
        uses: actions/upload-artifact@v4
        with:
          name: VyaparAI-Debug-AAB
          path: |
            android-app/app/build/outputs/bundle/debug/*.aab
            VyaparAI_GitHub_Compatible/android-app/app/build/outputs/bundle/debug/*.aab
          if-no-files-found: error
