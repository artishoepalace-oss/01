name: Vyapar AI Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-debug:
    name: Build Debug APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Files
        run: |
          echo "Repository root:"
          ls -la
          echo "Searching project files:"
          find . -maxdepth 4 -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" -o -name "build.gradle" -o -name "build.gradle.kts" \)

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Packages
        run: |
          sdkmanager --version
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          yes | sdkmanager --licenses || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Find Android Project
        run: |
          PROJECT_SETTINGS=$(find . -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n 1)

          if [ -z "$PROJECT_SETTINGS" ]; then
            echo "ERROR: settings.gradle file not found."
            echo "Fix: ZIP ko extract karke uske andar wale folders GitHub me upload karo."
            echo "GitHub repo me direct .zip file upload karne se APK nahi banega."
            echo "Current files:"
            find . -maxdepth 3 -type f
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PROJECT_SETTINGS")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Android project found at: $PROJECT_DIR"

      - name: Check Project Files
        run: |
          echo "Using project: $PROJECT_DIR"

          test -f "$PROJECT_DIR/settings.gradle" || test -f "$PROJECT_DIR/settings.gradle.kts"
          test -f "$PROJECT_DIR/build.gradle" || test -f "$PROJECT_DIR/build.gradle.kts"
          test -f "$PROJECT_DIR/app/build.gradle" || test -f "$PROJECT_DIR/app/build.gradle.kts"
          test -f "$PROJECT_DIR/app/src/main/AndroidManifest.xml"

          echo "Project files OK"

      - name: Make Gradle Wrapper Executable
        run: |
          if [ -f "$PROJECT_DIR/gradlew" ]; then
            chmod +x "$PROJECT_DIR/gradlew"
          fi

      - name: Build Debug APK
        run: |
          cd "$PROJECT_DIR"
          if [ -f "./gradlew" ]; then
            ./gradlew --no-daemon --stacktrace :app:assembleDebug
          else
            gradle --no-daemon --stacktrace :app:assembleDebug
          fi

      - name: Build Debug AAB
        run: |
          cd "$PROJECT_DIR"
          if [ -f "./gradlew" ]; then
            ./gradlew --no-daemon --stacktrace :app:bundleDebug
          else
            gradle --no-daemon --stacktrace :app:bundleDebug
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VyaparAI-Debug-APK
          path: "**/app/build/outputs/apk/debug/*.apk"
          if-no-files-found: error

      - name: Upload Debug AAB
        uses: actions/upload-artifact@v4
        with:
          name: VyaparAI-Debug-AAB
          path: "**/app/build/outputs/bundle/debug/*.aab"
          if-no-files-found: error
